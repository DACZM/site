<head>
    <meta charset="UTF-8">

    <style>
        :root {
            /* Professional Dark Palette */
            --bg-app: #050505;
            --bg-sidebar: #000000;
            --bg-card: #0A0A0A;
            --bg-card-hover: #111111;
            
            --border-light: #1F1F1F;
            --border-hover: #333333;
            
            --text-primary: #ECECEC;
            --text-secondary: #A1A1AA;
            --text-muted: #52525B;
            
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --radius: 8px;
            --header-height: 64px;
            --sidebar-width: 240px;
            --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-app);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- UTILS --- */
        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            flex-shrink: 0;
            z-index: 20;
        }

        .brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            margin-bottom: 32px;
            padding-left: 24px;
            text-transform: uppercase;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            padding-left: 24px;
            margin-top: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .nav-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.02); }
        
        .nav-item.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background-color: var(--text-primary);
        }

        /* --- MAIN AREA --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            background-color: var(--bg-app);
        }

        /* HEADER */
        header {
            height: var(--header-height);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .header-title-group {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-count {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .header-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .util-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            text-decoration: none;
        }

        .util-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-hover);
            background: var(--bg-card);
        }

        /* SEARCH */
        .search-wrapper {
            position: relative;
            width: 260px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 8px 12px 8px 36px;
            font-family: var(--font-main);
            font-size: 13px;
            border-radius: 4px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--border-hover);
            background: #0F0F0F;
        }

        /* CONTENT */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .content-scroll::-webkit-scrollbar { width: 6px; }
        .content-scroll::-webkit-scrollbar-track { background: transparent; }
        .content-scroll::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* CARD STYLE */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            color: var(--text-primary);
            padding: 20px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            transition: var(--transition);
            position: relative;
        }

        .card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .card-url {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.7;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .card-tag {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-actions { opacity: 1; }

        .action-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-icon:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.1);
        }

        .fav-icon.active { color: #EAB308; stroke: #EAB308; fill: #EAB308; }

        /* VIEWS */
        .view-section { display: none; animation: fadeIn 0.2s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE NAV */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            border-top: 1px solid var(--border-light);
            padding: 8px 0 20px 0;
            z-index: 50;
            justify-content: space-around;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-muted);
            text-decoration: none;
            gap: 6px;
            padding: 8px 12px;
        }

        .mobile-nav-item.active { color: var(--text-primary); }
        .mobile-nav-item svg { width: 20px; height: 20px; stroke-width: 1.5; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #FFFFFF;
            color: #000000;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main { padding-bottom: 70px; }
            header { padding: 0 16px; }
            .content-scroll { padding: 16px; }
            .grid { grid-template-columns: 1fr; }
            .search-wrapper { width: 100px; }
            .search-input { padding-right: 8px; }
            .util-btn span { display: none; }
            .util-btn { padding: 8px; }
            .card-actions { opacity: 1; }
        }
    </style>
</head>

            toggleFavorite(id, e) {
                e.stopPropagation(); e.preventDefault();
                const idx = this.favorites.indexOf(id);
                if (idx === -1) {
                    this.favorites.push(id);
                    this.showToast("Added to favorites");
                } else {
                    this.favorites.splice(idx, 1);
                    this.showToast("Removed from favorites");
                }
                localStorage.setItem('dachub_favs_v2', JSON.stringify(this.favorites));
                this.render(this.currentTab, document.querySelector('.search-input').value);
            },

            copyLink(url, e) {
                e.stopPropagation(); e.preventDefault();
                navigator.clipboard.writeText(url).then(() => this.showToast("Link copied"));
            },

            showToast(msg) {
                const t = document.getElementById('toast');
                const m = document.getElementById('toastMsg');
                m.innerText = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            },

            createCard(item, category) {
                const cleanUrl = item.url.replace(/^https?:\/\//, '');
                const isFav = this.isFavorite(item.id);
                
                // Fixed: Added backticks \` \`
                return `
                <a href="${item.url}" target="_blank" class="card">
                    <div class="card-top">
                        <div class="card-title">${item.name}</div>
                        <div class="card-actions">
                            <div class="action-icon fav-icon ${isFav ? 'active' : ''}" onclick="app.toggleFavorite('${item.id}', event)">
                                <svg class="icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </div>
                            <div class="action-icon" onclick="app.copyLink('${item.url}', event)">
                                <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="card-url">${cleanUrl}</div>
                    <div class="card-footer">
                        <span class="card-tag">${category}</span>
                    </div>
                </a>`;
            },

            render(category, filter = "") {
                // Fixed: Added backticks \` \`
                const container = document.getElementById(`grid-${category}`);
                let data = category === 'favorites' ? [] : db[category];
                
                if (category === 'favorites') {
                    Object.values(db).forEach(arr => {
                        data.push(...arr.filter(i => this.favorites.includes(i.id)));
                    });
                }
                
                if (!container) return;

                const filtered = data.filter(item => 
                    item.name.toLowerCase().includes(filter.toLowerCase()) || 
                    item.url.toLowerCase().includes(filter.toLowerCase())
                );

                document.getElementById('countBadge').textContent = filtered.length;

                if (filtered.length === 0) {
                    // Fixed: Added backticks \` \`
                    container.innerHTML = `<div style="color:var(--text-muted); font-size:13px; grid-column:1/-1; padding:20px; text-align:center;">No results found.</div>`;
                    return;
                }

                container.innerHTML = filtered.map(i => this.createCard(i, category === 'favorites' ? 'Saved' : category)).join('');
            },

            renderAll(filter = "") {
                Object.keys(db).forEach(k => this.render(k, filter));
                this.render('favorites', filter);
            },

            setTab(tabId, e) {
                if(e) e.preventDefault();
                this.currentTab = tabId;
                document.getElementById('pageTitle').textContent = tabId.charAt(0).toUpperCase() + tabId.slice(1);
                
                document.querySelectorAll('.sidebar .nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('onclick').includes(tabId)));
                document.querySelectorAll('.mobile-nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('onclick').includes(tabId)));
                
                document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                // Fixed: Added backticks \` \`
                const target = document.getElementById(`view-${tabId}`);
                if(target) target.classList.add('active');

                this.render(tabId, document.querySelector('.search-input').value);
            },

            handleSearch(val) { this.render(this.currentTab, val); }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
